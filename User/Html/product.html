<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product · Noir Perfume</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../CSS/shop.css">
</head>
<body>
  <nav class="navbar">
    <a href="../../home.html" class="logo">Noir perfume</a>
    <ul>
      <li><a href="../../home.html">Home</a></li>
      <li class="nav-item-shop">
        <a href="Shopall.html">Shop</a>
        <div class="dropdown-menu dropdown-menu--horizontal">
          <a href="Shopall.html">Shop all</a>
          <a href="Men.html">For men</a>
          <a href="Women.html">For women</a>
          <a href="Unisex.html">Unisex</a>
        </div>
      </li>
      <li><a href="../../home.html#flash-sale">Flash sale</a></li>
      <li><a href="aboutus.html">About us</a></li>
      <li><a href="contactus.html">Contact</a></li>
    </ul>
    <div class="icons">
      <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
      <a href="login.html" class="nav-icon-link" aria-label="Account"><i class="fa-regular fa-user"></i></a>
      <span id="fav-drawer-trigger" class="nav-icon-link nav-fav-trigger" role="button" tabindex="0" aria-label="Favorites"><i class="fa-regular fa-heart"></i></span>
      <i class="fa-solid fa-bag-shopping" onclick="toggleCart()" style="cursor:pointer;position:relative" role="button" tabindex="0" aria-label="Cart">
        <span id="cart-count" style="position:absolute;top:-10px;right:-12px;background:#b76e79;color:#fff;font-size:11px;border-radius:50%;padding:2px 6px;min-width:18px;text-align:center">0</span>
      </i>
    </div>
  </nav>

  <div class="global-search" id="globalSearchPanel" aria-hidden="true">
    <div class="global-search__dialog" role="dialog" aria-modal="true" aria-labelledby="global-search-title">
      <div class="global-search__head">
        <h2 id="global-search-title">Search</h2>
        <button type="button" class="global-search__close" id="globalSearchClose" aria-label="Close search">✕</button>
      </div>
      <label class="visually-hidden" for="globalSearchInput">Search products</label>
      <input type="search" id="globalSearchInput" class="global-search__input" placeholder="Search perfumes…" autocomplete="off">
      <ul class="global-search__results" id="globalSearchResults"></ul>
    </div>
  </div>

  <main class="product-page" id="productRoot">
    <div class="product-detail">
      <div class="product-detail__media">
        <img id="pdImg" src="" alt="">
      </div>
      <div class="product-detail__info">
        <h1 id="pdTitle"></h1>
        <p class="lead" id="pdLead"></p>
        <p class="product-detail__price" id="pdPrice"></p>
        <div class="size-select">
          <label for="pdSize">Bottle size (ml)</label>
          <select id="pdSize"></select>
        </div>
        <div class="product-detail__top-actions">
          <button type="button" class="product-detail__fav" id="pdFav" aria-pressed="false" aria-label="Add to favorites">
            <span class="product-detail__fav-icon" aria-hidden="true">❤</span>
          </button>
          <div class="product-qty">
            <label>Quantity</label>
            <div class="qty-stepper">
              <button type="button" class="qty-step-btn" id="pdQtyDec" aria-label="Decrease">−</button>
              <span class="qty-step-val" id="pdQty">1</span>
              <button type="button" class="qty-step-btn" id="pdQtyInc" aria-label="Increase">+</button>
            </div>
          </div>
        </div>
        <div class="product-actions">
          <button type="button" class="btn-add-cart" id="pdAddCart">Add to cart</button>
          <button type="button" class="btn-buy" id="pdBuyNow">Buy now</button>
        </div>

        <div class="scent-notes" id="pdScentNotes" style="display:none">
          <h3 class="scent-notes__title">Scent profile</h3>
          <div class="scent-notes__rows" id="pdScentRows"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- ── Related Items ──────────────────────────────────── -->
  <section class="related-section" id="relatedSection">
    <div class="related-inner">
      <h2 class="related-heading">You might also like</h2>
      <div class="related-grid" id="relatedGrid"></div>
    </div>
  </section>

  <!-- ── Reviews & Ratings ──────────────────────────────────── -->
  <section class="reviews-section" id="reviewsSection" data-product-id="">
    <div class="reviews-inner">
      <div class="reviews-header">
        <h2 class="reviews-heading">Customer Reviews</h2>
      </div>

      <div class="reviews-layout">
        <div class="reviews-left">
          <div id="reviewsSummary"></div>
          <div id="reviewFormWrap"></div>
        </div>
        <div class="reviews-right">
          <div id="reviewsList"></div>
        </div>
      </div>
    </div>
  </section>

  <div class="not-found" id="productNotFound" style="display:none">
    <h1>Product not found</h1>
    <p><a href="Shopall.html">Browse the shop</a></p>
  </div>

  <div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button type="button" class="close-btn" onclick="toggleCart()" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items" id="cart-items">
      <p class="empty-msg">Your cart is empty.</p>
    </div>
    <div class="cart-footer" id="cart-footer" style="display:none;">
      <div class="cart-total">Total: <span id="cart-total">0</span></div>
      <button type="button" class="checkout-btn">Checkout</button>
    </div>
  </div>
  <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

  <script src="../Js/products-catalog.js"></script>
  <script src="../Js/shop.js"></script>
  <script src="../Js/quick-view-modal.js"></script>
  <script src="../Js/nav-search.js"></script>
  <script src="../Js/cookie-consent.js"></script>
  <script src="../Js/product-page.js"></script>
  <script src="../Js/reviews.js"></script>
</body>
</html>
